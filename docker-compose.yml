version: "3.9"

services:

  frontend:
    build: .
    container_name: legacy-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: legacy-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
